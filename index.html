<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dysimul Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: #0a0a0a;
      color: #f0f0f0;
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }
    h1 { font-size: 2.5rem; letter-spacing: 0.2em; margin-bottom: 1rem; }
    .divider { width: 60px; height: 2px; background: #444; margin: 1.5rem auto; }
    .coming-soon { font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase; color: #888; margin-bottom: 0.5rem; }
    .game-title { font-size: 1.8rem; font-weight: bold; letter-spacing: 0.1em; margin-bottom: 1rem; }
    .description { font-size: 1rem; color: #aaa; max-width: 480px; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>DYSIMUL GAMES</h1>
  <div class="divider"></div>
  <p class="coming-soon">Coming Soon</p>
  <p class="game-title">OLIGARCH</p>
  <p class="description">A global strategy game where power is the only currency that matters.</p>
</body>
</html>
